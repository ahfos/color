<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>COLOR — spot the code</title>
    <meta
      name="description"
      content="A color-spotting game companion to TypedUp. Get faster and more accurate at reading RGB/Hex codes."
    />
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/color.css" />
  </head>
  <body>
    <div id="homeView" class="app-shell landing page-enter">
      <button type="button" class="landing__share-trigger" id="shareTriggerBtn" aria-label="Share to Instagram Story">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="18" cy="5" r="3" />
          <circle cx="6" cy="12" r="3" />
          <circle cx="18" cy="19" r="3" />
          <line x1="8.6" y1="10.6" x2="15.4" y2="6.4" />
          <line x1="8.6" y1="13.4" x2="15.4" y2="17.6" />
        </svg>
      </button>

      <div class="landing__main">
        <div class="landing__logo">
          <img src="assets/logo.svg" alt="COLOR" />
        </div>

        <div class="landing__section">
          <div class="landing__divider">Work</div>
          <nav class="landing__levels" aria-label="Tools">
            <button type="button" class="landing__level" id="openPairingsBtn">
              <span class="landing__level-title">Color Pairings</span>
              <span class="landing__level-sub">Enter any hex or RGB and get its complementary, analogous, triadic, split-comp, tetradic and monochromatic matches — plotted on a wheel and exportable as a palette card.</span>
            </button>
          </nav>
        </div>

        <div class="landing__section">
          <div class="landing__divider">Play</div>
          <nav class="landing__levels" aria-label="Game mode">
            <button type="button" class="landing__level" data-enter-mode="guesser">
              <span class="landing__level-title">Guess</span>
              <span class="landing__level-sub">Type codes to find the hidden color</span>
            </button>
            <button type="button" class="landing__level" data-enter-mode="pointer">
              <span class="landing__level-title">Point</span>
              <span class="landing__level-sub">Given a code, mark where it lives</span>
            </button>
          </nav>
        </div>
      </div>

      <footer class="landing__credit">
        <a href="https://www.ahfos.com" target="_blank" rel="noopener noreferrer">MADE BY AHFOS</a>
      </footer>
    </div>

    <div id="gameView" class="app-shell" hidden>
      <header class="app-header">
        <div class="app-header__left">
          <button type="button" class="back-link" id="backToHomeBtn" aria-label="Back to home">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="19" y1="12" x2="5" y2="12" />
              <polyline points="12 19 5 12 12 5" />
            </svg>
          </button>
          <button type="button" class="app-header__logo-btn" id="headerLogoBtn" aria-label="COLOR — back to home">
            <img class="app-header__logo" src="assets/logo.svg" alt="" />
          </button>
        </div>
        <div class="stat-bar">
          <span class="stat-bar__stat">Score <strong id="scoreCounter">0</strong></span>
          <span class="stat-bar__stat">Streak <strong id="streakCounter">0</strong></span>
          <span class="stat-bar__stat">Best <strong id="bestCounter">0</strong></span>
        </div>
      </header>

      <main class="game" id="game">
        <div class="target-display" data-pointer-only hidden>
          <span class="target-display__label">Find this color</span>
          <span class="target-display__code" id="pointerTargetCode">#FFFFFF</span>
        </div>

        <div class="guess-panel" data-guesser-only>
          <div class="guess-panel__swatch" id="liveSwatch" aria-hidden="true"></div>

          <div class="code-input" id="codeInput">
            <div class="code-input__toggle" role="tablist" aria-label="Code format">
              <button type="button" class="code-input__toggle-btn is-active" data-format="rgb">RGB</button>
              <button type="button" class="code-input__toggle-btn" data-format="hex">HEX</button>
            </div>

            <div class="code-input__fields" data-format-fields="rgb">
              <input
                class="code-input__box"
                type="number"
                min="0"
                max="255"
                inputmode="numeric"
                pattern="[0-9]*"
                data-channel="r"
                placeholder="R"
                aria-label="Red channel"
              />
              <input
                class="code-input__box"
                type="number"
                min="0"
                max="255"
                inputmode="numeric"
                pattern="[0-9]*"
                data-channel="g"
                placeholder="G"
                aria-label="Green channel"
              />
              <input
                class="code-input__box"
                type="number"
                min="0"
                max="255"
                inputmode="numeric"
                pattern="[0-9]*"
                data-channel="b"
                placeholder="B"
                aria-label="Blue channel"
              />
            </div>

            <div class="code-input__fields" data-format-fields="hex" hidden>
              <span class="code-input__hash">#</span>
              <input
                class="code-input__box code-input__box--hex"
                type="text"
                maxlength="6"
                inputmode="text"
                autocapitalize="characters"
                autocomplete="off"
                autocorrect="off"
                spellcheck="false"
                data-channel="hex"
                placeholder="RRGGBB"
                aria-label="Hex code"
              />
            </div>
          </div>
        </div>

        <div class="color-map" data-color-map data-pointer-only hidden>
          <div class="color-map__sv" data-map-sv>
            <canvas data-map-sv-canvas></canvas>
            <div class="color-map__marker color-map__marker--ghost" data-map-sv-ghost hidden></div>
            <div class="color-map__marker" data-map-sv-marker></div>
          </div>
          <div class="color-map__hue" data-map-hue>
            <canvas data-map-hue-canvas></canvas>
            <div class="color-map__marker color-map__marker--hue color-map__marker--ghost" data-map-hue-ghost hidden></div>
            <div class="color-map__marker color-map__marker--hue" data-map-hue-marker></div>
          </div>
        </div>

        <div class="game-actions">
          <button type="button" class="btn" id="howCloseBtn" data-guesser-only>
            How close? <span class="hint-cost">(costs a hint)</span>
          </button>
          <button type="button" class="btn btn--primary" id="submitBtn" data-guesser-only>
            Submit
          </button>
          <button type="button" class="btn btn--primary" id="confirmBtn" data-pointer-only hidden>
            Confirm placement
          </button>
          <button type="button" class="btn" id="newRoundBtn">New color</button>
        </div>

        <p class="feedback" id="feedback" aria-live="polite"></p>
      </main>
    </div>

    <div id="pairingsView" class="app-shell" hidden>
      <header class="app-header">
        <div class="app-header__left">
          <button type="button" class="back-link" id="pairingsBackBtn" aria-label="Back to home">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="19" y1="12" x2="5" y2="12" />
              <polyline points="12 19 5 12 12 5" />
            </svg>
          </button>
          <button type="button" class="app-header__logo-btn" id="pairingsLogoBtn" aria-label="COLOR — back to home">
            <img class="app-header__logo" src="assets/logo.svg" alt="" />
          </button>
        </div>
        <h1 class="pairings-header__title">Color Pairings</h1>
      </header>

      <main class="pairings" id="pairings">
        <div class="pairings-input">
          <div class="code-input" id="pairingsCodeInput" data-pairings-code-input>
            <div class="code-input__toggle" role="tablist" aria-label="Code format">
              <button type="button" class="code-input__toggle-btn is-active" data-pairings-format="hex">HEX</button>
              <button type="button" class="code-input__toggle-btn" data-pairings-format="rgb">RGB</button>
            </div>

            <div class="code-input__fields" data-pairings-format-fields="hex">
              <span class="code-input__hash">#</span>
              <input
                class="code-input__box code-input__box--hex"
                type="text"
                maxlength="6"
                inputmode="text"
                autocapitalize="characters"
                autocomplete="off"
                autocorrect="off"
                spellcheck="false"
                data-pairings-channel="hex"
                placeholder="RRGGBB"
                aria-label="Hex code"
              />
            </div>

            <div class="code-input__fields" data-pairings-format-fields="rgb" hidden>
              <input class="code-input__box" type="number" min="0" max="255" inputmode="numeric" pattern="[0-9]*" data-pairings-channel="r" placeholder="R" aria-label="Red channel" />
              <input class="code-input__box" type="number" min="0" max="255" inputmode="numeric" pattern="[0-9]*" data-pairings-channel="g" placeholder="G" aria-label="Green channel" />
              <input class="code-input__box" type="number" min="0" max="255" inputmode="numeric" pattern="[0-9]*" data-pairings-channel="b" placeholder="B" aria-label="Blue channel" />
            </div>
          </div>
          <button type="button" class="btn" id="pairingsRandomBtn">Random</button>
        </div>

        <div class="pairings-harmony-tabs" role="tablist" aria-label="Harmony type">
          <button type="button" class="pairings-harmony-tab is-active" role="tab" aria-selected="true" data-harmony="complementary">Complementary</button>
          <button type="button" class="pairings-harmony-tab" role="tab" aria-selected="false" data-harmony="analogous">Analogous</button>
          <button type="button" class="pairings-harmony-tab" role="tab" aria-selected="false" data-harmony="triadic">Triadic</button>
          <button type="button" class="pairings-harmony-tab" role="tab" aria-selected="false" data-harmony="splitComplementary">Split-Comp</button>
          <button type="button" class="pairings-harmony-tab" role="tab" aria-selected="false" data-harmony="tetradic">Tetradic</button>
          <button type="button" class="pairings-harmony-tab" role="tab" aria-selected="false" data-harmony="monochromatic">Monochromatic</button>
        </div>

        <div class="pairings-wheel-wrap">
          <div class="pairings-wheel" data-pairings-wheel>
            <canvas data-pairings-wheel-canvas></canvas>
            <div class="pairings-wheel__markers" data-pairings-wheel-markers></div>
          </div>
          <p class="pairings-wheel__note" data-pairings-wheel-note hidden>
            Monochromatic shades share one hue &amp; saturation — a wheel can't show lightness, so they're stacked at one point. See the ladder below.
          </p>
        </div>

        <div class="pairings-recent" id="pairingsRecent" aria-label="Recently used colors" hidden></div>

        <section class="bento" id="pairingsBento" aria-label="Palette details"></section>

        <div class="pairings-actions">
          <button type="button" class="btn" id="pairingsCopyAllBtn">Copy all</button>
          <button type="button" class="btn" id="pairingsShareLinkBtn">Copy link</button>
          <button type="button" class="btn btn--primary" id="pairingsExportBtn">Export PNG</button>
        </div>

        <p class="feedback" id="pairingsFeedback" aria-live="polite"></p>
      </main>
    </div>

    <div class="results-overlay" id="resultsOverlay" hidden>
      <div class="results-card">
        <h2 class="results-card__title" id="resultsTitle">Nailed it</h2>
        <div class="results-card__swatches">
          <div class="results-swatch">
            <span class="results-swatch__label">Your guess</span>
            <div class="results-swatch__color" id="resultGuessSwatch"></div>
            <span class="results-swatch__code" id="resultGuessCode"></span>
          </div>
          <div class="results-swatch">
            <span class="results-swatch__label">Target</span>
            <div class="results-swatch__color" id="resultTargetSwatch"></div>
            <span class="results-swatch__code" id="resultTargetCode"></span>
          </div>
        </div>
        <p class="results-card__score" id="resultsScore"></p>
        <div class="results-card__actions">
          <button type="button" class="btn" id="wallpaperBtn">Save as wallpaper</button>
          <button type="button" class="btn btn--primary" id="playAgainBtn">Play again</button>
        </div>
      </div>
    </div>

    <div class="wallpaper-overlay" id="wallpaperOverlay" hidden>
      <div class="wallpaper-card">
        <h3>Save as wallpaper</h3>
        <label class="wallpaper-option">
          <input type="radio" name="wallpaperOrientation" value="landscape" checked />
          4K Landscape (3840×2160)
        </label>
        <label class="wallpaper-option">
          <input type="radio" name="wallpaperOrientation" value="portrait" />
          4K Portrait (2160×3840)
        </label>
        <label class="wallpaper-option">
          <input type="checkbox" id="wallpaperShowHex" />
          Print hex code, centered
        </label>
        <div class="wallpaper-card__actions">
          <button type="button" class="btn" id="wallpaperCancelBtn">Cancel</button>
          <button type="button" class="btn btn--primary" id="wallpaperDownloadBtn">Download</button>
        </div>
      </div>
    </div>

    <div class="share-story" id="shareStoryOverlay" hidden>
      <button type="button" class="share-story__backdrop" id="shareStoryBackdrop" aria-label="Close"></button>
      <div class="share-story__panel">
        <div class="share-story__preview">
          <canvas id="shareStoryCanvas" class="share-story__canvas"></canvas>
          <div class="share-story__loading" id="shareStoryLoading">Rendering…</div>
        </div>
        <button type="button" class="share-story__share-btn" id="shareStoryShareBtn" disabled>
          Share to Instagram Story
        </button>
        <p class="share-story__status" id="shareStoryStatus" hidden></p>
        <button type="button" class="share-story__close" id="shareStoryCloseBtn">Close</button>
      </div>
    </div>

    <script src="js/colorEngine.js"></script>
    <script src="js/sounds.js"></script>
    <script src="js/colorMap.js"></script>
    <script src="js/wallpaper.js"></script>
    <script src="js/share.js"></script>
    <script src="js/colorNames.js"></script>
    <script src="js/pairingsWheel.js"></script>
    <script src="js/bentoExport.js"></script>
    <script src="js/modeGuesser.js"></script>
    <script src="js/modePointer.js"></script>
    <script src="js/pairings.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
